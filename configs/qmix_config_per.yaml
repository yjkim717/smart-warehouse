# QMIX + PER + Reward Shaping Configuration

qmix:
  # ---- Network architecture ----
  hidden_dim: 128
  n_layers: 2
  mixing_dim: 32

  # ---- Optimizer ----
  lr: 0.0001
  lr_decay: true
  lr_min: 0.00001

  # ---- Q-learning ----
  gamma: 0.99
  max_grad_norm: 0.5
  target_update_interval: 200

  # ---- Replay buffer ----
  buffer_size: 100_000
  batch_size: 128
  train_start: 1000

  # ---- Epsilon decay ----
  epsilon_start: 1.0
  epsilon_end: 0.05

  # ---- Training schedule ----
  total_timesteps: 3_000_000
  eval_episodes: 20
  eval_interval: 10000
  save_interval: 50000
  log_interval: 2000

  # ---- Paths ----
  checkpoint_dir: "results/checkpoints_per"
  log_dir: "results/logs_per"

  # ---- PER ----
  per_alpha: 0.6       # prioritization strength (0=uniform, 1=full)
  per_beta_start: 0.4  # IS correction start
  per_beta_end: 1.0    # IS correction end

  # ---- Reward Shaping ----
  pickup_reward: 0.3   # bonus for picking up a requested shelf
  dropoff_reward: 0.1  # bonus for returning shelf to correct spot
