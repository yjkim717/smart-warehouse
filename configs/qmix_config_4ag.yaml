# QMIX Training Configuration — 4 agents

qmix:
  # ---- Network architecture ----
  hidden_dim: 128
  n_layers: 2
  mixing_dim: 32

  # ---- Optimizer ----
  lr: 0.0001
  lr_decay: true
  lr_min: 0.00001

  # ---- Q-learning ----
  gamma: 0.99
  max_grad_norm: 0.5
  target_update_interval: 200

  # ---- Replay buffer ----
  buffer_size: 100_000
  batch_size: 128
  train_start: 1000

  # ---- Epsilon decay ----
  epsilon_start: 1.0
  epsilon_end: 0.05

  # ---- Training schedule ----
  total_timesteps: 3_000_000
  eval_episodes: 20
  eval_interval: 10000
  save_interval: 50000
  log_interval: 2000

  # ---- Paths ----
  checkpoint_dir: "results/checkpoints_4ag"
  log_dir: "results/logs_4ag"
