# HAPPO Training Configuration — 4-Agent Small Grid (rware-small-4ag-v2)
# Use with: python3 scripts/train_happo.py --env-config configs/env_config_4ag.yaml --happo-config configs/happo_config_4ag.yaml

happo:
  # ---- Network architecture ----
  hidden_dim: 256            # raised from 128 — 4-agent coordination on larger grid
                              #   needs more capacity than 2-agent task
  n_layers: 2

  # ---- PPO hyperparameters ----
  lr_actor: 0.0003
  lr_critic: 0.0005
  gamma: 0.99
  gae_lambda: 0.95

  # Clip epsilon decay
  clip_epsilon_start: 0.2
  clip_epsilon_end:   0.15   # raised from 0.1 — less aggressive decay; validated by 2-agent run

  # Entropy annealing — CRITICAL FIX: 0.02 start caused early collapse in 2-agent run.
  # 4 independent actors each see 1/4 the data vs MAPPO shared actor — need even more
  # exploration pressure, not less.
  entropy_coef_start: 0.05   # raised from 0.02 — matches 2-agent fix
  entropy_coef_end:   0.01   # raised from 0.003 — maintain exploration at end of run

  value_loss_coef: 0.5
  max_grad_norm: 0.5

  # ---- LR decay (cosine schedule) ----
  lr_decay: true
  lr_min: 0.00001

  # ---- Rollout ----
  # n_steps=256 was < half an episode (500 steps) — very noisy GAE bootstrap estimates.
  # 1000 spans ~2 full episodes per rollout for accurate return estimates.
  # minibatch_size=128 gives ~8 minibatches per actor per epoch (vs 1 previously).
  n_steps: 1000              # raised from 256
  n_epochs: 4
  minibatch_size: 128        # reduced from 256 — more gradient steps per rollout

  # ---- Training schedule ----
  # 4-agent coordination on a larger grid is strictly harder than 2-agent.
  # 2-agent run was still improving at 5M and peaked later — use 10M here.
  total_timesteps: 10_000_000  # raised from 5_000_000
  eval_episodes: 20
  eval_interval: 10000
  save_interval: 50000
  log_interval: 2000

  # ---- Paths — separate from 2-agent and MAPPO results ----
  checkpoint_dir: "results/checkpoints_happo_4ag"
  log_dir: "results/logs_happo_4ag"
