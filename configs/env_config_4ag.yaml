# Warehouse Environment Configuration — 4-Agent Small Grid
# Use with: python3 scripts/train_mappo.py --env-config configs/env_config_4ag.yaml --mappo-config configs/mappo_config_4ag.yaml

env:
  # rware-small-4ag-v2: 4 robots, 20×10 grid (~2× area of tiny)
  name: "rware-small-4ag-v2"
  n_agents: 4

  max_steps: 500          # same as 2-agent for fair comparison
  reward_type: "individual"
  randomize_goals: true

  # Reward shaping — rebalanced for 4-agent scale (see scaling_analysis.md)
  # Intermediate signals reduced so delivery bonus (+3.0) dominates the reward landscape.
  # Original 2-agent values caused reward hacking: agents earned +9.74/ep without delivering.
  reward_shaping:
    enabled: true
    pickup_reward: 0.1        # low — prevents pickup-farming (same as 2-agent fix)
    delivery_bonus: 3.0       # raised from 2.0 — total = rware +1 + 3.0 = +4.0;
                              #   makes delivery the unambiguous dominant signal
    step_penalty: -0.001      # reduced from -0.002 — 4×500×0.001 = -2.0 team baseline,
                              #   less noise drowning the delivery signal
    carry_toward_goal: 0.01   # kept low so delivery signal dominates
    move_toward_shelf: 0.01   # kept low so delivery signal dominates
    bad_drop_penalty: -0.8    # raised from -0.6 — net of bad pick+drop = 0.1-0.8 = -0.7
    linger_penalty: -0.02     # reduced from -0.05 — was too harsh on goal cell approach
    collision_penalty: 0.0    # disabled — catastrophic per-step penalty in shared grid

  # GIF recording
  record:
    fps: 8
    output_dir: "results/videos_4ag"
    filename: "random_policy_4ag.gif"
