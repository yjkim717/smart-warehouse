# Warehouse Environment Configuration - Optimized for 4-Agent QMIX

env:
  name: "rware-small-4ag-v2"
  n_agents: 4

  # QMIX performs better with longer horizons in larger grids
  max_steps: 800             
  reward_type: "global"      # Crucial: QMIX is designed for a single joint reward signal
  randomize_goals: true   

  reward_shaping:
    enabled: true
    # --- Primary Rewards ---
    pickup_reward: 2.0         # Increased to provide a stronger intermediate gradient
    delivery_bonus: 10.0       # Massive spike to make the "Success" signal stand out in the Mixer
    
    # --- Penalties (The "Fine-Tuning") ---
    step_penalty: -0.02        # Added small pressure to prevent "idling" or infinite loops
    bad_drop_penalty: -0.5     # Penalize dropping shelves in non-goal locations
    collision_penalty: -1.0    # Essential for 4 agents to prevent aisle blocking
    linger_penalty: -0.05      # Discourage agents from staying in one spot too long

    # --- Potential-based Shaping (Dense) ---
    # We keep these low so the agent doesn't "farm" them instead of delivering
    carry_toward_goal: 0.05    
    move_toward_shelf: 0.05    

  # GIF recording
  record:
    fps: 10
    output_dir: "results/videos"
    filename: "qmix_4agent_optimized.gif"