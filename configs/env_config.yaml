# Warehouse Environment Configuration

env:
  # rware preset: "tiny-2ag-v2" | "small-4ag-v2"
  # tiny  = 2 robots, 11x10 grid  (debug)
  # small = 4 robots, larger grid (presentation)
  name: "rware-tiny-2ag-v2"
  n_agents: 2

  # Override rware defaults (optional)
  # These match rware's internal kwargs — set null to use rware defaults
  max_steps: 500          # max steps per episode
  reward_type: "individual"  # "individual" | "global"
  randomize_goals: true   # true = P positions randomized each episode (excludes shelf cells)

  # Reward shaping (dense intermediate rewards for training)
  reward_shaping:
    enabled: true
    pickup_reward: 0.1        # reduced from 0.5 — was teaching pickup as a terminal goal;
                              #   agents picked up 1.68×/ep but only delivered 0.65× (39% rate)
    delivery_bonus: 3.0       # raised from 2.0 — total rware+shaping = 4.0, makes delivery
                              #   the unambiguous dominant signal vs picking up alone
    step_penalty: -0.001      # reduced from -0.005 — old value created -2.5 baseline per episode
                              #   (500 steps × 0.005), causing 33% of episodes to be deeply
                              #   negative and swamping the delivery signal
    carry_toward_goal: 0.05   # bonus for moving closer to goal while carrying
    move_toward_shelf: 0.05   # bonus for moving closer to shelf when empty-handed
    bad_drop_penalty: -0.8    # raised from -0.6 — compensates for lower pickup_reward;
                              #   net of bad pick+drop = 0.1 - 0.8 = -0.7 (strongly discourage)
    linger_penalty: -0.02     # reduced from -0.05 — was too harsh on goal cell approach
    collision_penalty: 0.0    # disabled — catastrophic in tiny shared grid where agents are adjacent constantly

  # GIF recording
  record:
    fps: 8
    output_dir: "results/videos"
    filename: "random_policy.gif"
