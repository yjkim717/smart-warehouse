# Warehouse Environment Configuration

env:
  # rware preset: "tiny-2ag-v2" | "small-4ag-v2"
  # tiny  = 2 robots, 11x10 grid  (debug)
  # small = 4 robots, larger grid (presentation)
  name: "rware-tiny-2ag-v2"
  n_agents: 2

  # Override rware defaults (optional)
  # These match rware's internal kwargs — set null to use rware defaults
  max_steps: 500          # max steps per episode
  reward_type: "individual"  # "individual" | "global"
  randomize_goals: true   # true = P positions randomized each episode (excludes shelf cells)

  reward_shaping:
    enabled: true
    pickup_reward: 1.0         # Drastically increased to reward intermediate success
    delivery_bonus: 5.0        # Massive spike so the Q-values clearly peak at the goal
    step_penalty: 0.0          # REMOVE entirely. Let the discount factor (Gamma) incentivize speed.
    carry_toward_goal: 0.05    # Increased slightly
    move_toward_shelf: 0.05    # Increased slightly
    bad_drop_penalty: -0.1     # Keep mild to discourage thrashing
    linger_penalty: 0.0        # REMOVE. This punishes agents for getting stuck during exploration.

  # GIF recording
  record:
    fps: 8
    output_dir: "results/videos"
    filename: "random_policy.gif"
